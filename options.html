<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title data-i18n="settingsTitle">GitHub UI Translator - Settings</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 480px;
    margin: 32px auto;
    padding: 0 16px;
    color: #1f2328;
    background-color: #ffffff;
  }
  h1 { font-size: 18px; }
  h2 { font-size: 14px; margin-top: 24px; }
  table { border-collapse: collapse; width: 100%; }
  td, th {
    text-align: left;
    padding: 4px 8px;
    border-bottom: 1px solid #d0d7de;
    font-size: 13px;
  }
</style>
</head>
<body>
  <h1 data-i18n="settingsTitle">GitHub UI Translator - Settings</h1>

  <h2 data-i18n="dictionaryInfoHeading">Dictionary information</h2>
  <table>
    <thead><tr><th data-i18n="languageColumn">Language</th><th data-i18n="entryCountColumn">Entries</th></tr></thead>
    <tbody id="dict-info"></tbody>
  </table>

  <h2 data-i18n="versionInfoHeading">Version information</h2>
  <p id="version"></p>

  <script src="shared.js"></script>
  <script src="options.js"></script>
</body>
</html>
