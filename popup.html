<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GitHub UI Translator</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    width: 220px;
    padding: 12px;
    margin: 0;
    color: #1f2328;
    background-color: #ffffff;
  }
  h1 {
    font-size: 14px;
    margin: 0 0 12px;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .status {
    font-size: 12px;
    color: #57606a;
    margin: 8px 0 0;
  }
  .switch {
    position: relative;
    display: inline-block;
    width: 40px;
    height: 22px;
    flex-shrink: 0;
  }
  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background-color: #d0d7de;
    transition: 0.2s;
    border-radius: 22px;
  }
  .slider::before {
    position: absolute;
    content: "";
    height: 16px;
    width: 16px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: 0.2s;
    border-radius: 50%;
  }
  input:checked + .slider {
    background-color: #1f883d;
  }
  input:checked + .slider::before {
    transform: translateX(18px);
  }
</style>
</head>
<body>
  <h1>GitHub UI Translator</h1>
  <div class="row">
    <span>翻訳</span>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>
  <p class="status" id="status"></p>
  <script src="popup.js"></script>
</body>
</html>
